version: "3.9"

services:
  db:
    image: postgres:15
    container_name: hackathon-db-compose
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hackathon_db
    ports:
      - "5434:5432"
    restart: always

  app:
    build: .
    container_name: reliability-app
    ports:
      - "5001:5000"
    restart: always
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      FLASK_DEBUG: "false"
    depends_on:
      - db